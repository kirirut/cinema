services:
  db:
    image: postgres:17-alpine
    container_name: cinema-postgres
    restart: unless-stopped
    labels:
      org.springframework.boot.service-connection: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schemas/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    networks:
      - cinema-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  seed:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    container_name: cinema-seed
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_HOST_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SEED_MOVIES: ${SEED_MOVIES:-40}
      SEED_DIRECTORS: ${SEED_DIRECTORS:-15}
      SEED_ACTORS: ${SEED_ACTORS:-30}
    networks:
      - cinema-net
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cinema-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - cinema-net

  frontend:
    build:
      context: ./angular-app
      dockerfile: Dockerfile
    container_name: cinema-frontend
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "4200:80"
    networks:
      - cinema-net

volumes:
  postgres_data:

networks:
  cinema-net:
    driver: bridge
